management:
  health:
    circuitbreakers:
      enabled: true
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

resilience4j:
  retry:
    configs:
      default:
        maxRetryAttempts: 3
        waitDuration: 100ms
      instances:
        inventoryRetry:
          baseConfig: default
          waitDuration: 200ms #in case we want to override in case of any instance
  rateLimiter:
    instances:
      inventoryRateLimiter:
        limitForPeriod: 100 #Max 10 calls in a refresh period
        limitRefreshPeriod: 1s #Refresh the limit every second
        timeoutDuration: 10ms #Time to wait for permission before a request fails
  circuitbreaker:
    instances:
      inventoryCircuitBreaker:
        registerHealthIndicator: true # Expose circuit breaker health via the actuator
        slidingWindowSize: 10 # Size of the sliding window for call recording
        slidingWindowType: COUNT_BASED # Use count-based sliding window
        minimumNumberOfCalls: 10 # Minimum number of calls before calculating failure rate
        failureRateThreshold: 50 # If 50%(5 out of 10) calls fail, the circuit goes to OPEN State
        waitDurationInOpenState: 1s # Time the circuit stays OPEN before moving to HALF_OPEN
        permittedNumberOfCallsInHalfOpenState: 3 # Number of test calls in HALF_OPEN State
        eventConsumerBufferSize: 10 # Buffer size of event logs
