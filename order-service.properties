server.servlet.context-path=/orders
server.port=9020

#DB configuration
spring.datasource.url=jdbc:mysql://order-service:3306/orderDB?useSSL=false
spring.datasource.username=root
spring.datasource.password=Real@1234
spring.jpa.hibernate.ddl-auto=create

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#eureka config
eureka.client.service-url.defaultZone=http://discovery-service:8761/eureka
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

my.variable=order-github-default
features.user-tracking-enabled=false
